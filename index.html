<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherSphere | Advanced Weather App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-animation">
        <div class="sun-animation" id="sun"></div>
        <div class="particles" id="particle-1"></div>
        <div class="particles" id="particle-2"></div>
        <div class="particles" id="particle-3"></div>
        <div class="particles" id="particle-4"></div>
    </div>

    <div class="container">
        <header class="header">
            <h1 class="logo">WeatherSphere</h1>
            <div class="search-container">
                <div class="search-wrapper">
                    <input type="text" id="search-input" placeholder="Search city or state..." autocomplete="off">
                    <div class="suggestions" id="suggestions"></div>
                </div>
                <button id="search-btn"><i class="fas fa-search"></i></button>
                <button id="location-btn" title="Use my location"><i class="fas fa-location-arrow"></i></button>
            </div>
        </header>

        <main class="main-content">
            <div class="weather-card">
                <div class="weather-header">
                    <div class="location-info">
                        <h2 id="city-name">Loading...</h2>
                        <p id="current-date">-- -- ----</p>
                    </div>
                    <div class="weather-icon-container">
                        <div class="weather-icon" id="weather-icon">
                            <i class="fas fa-sun"></i>
                        </div>
                        <p id="weather-description">-- --</p>
                    </div>
                </div>

                <div class="weather-details">
                    <div class="temperature-section">
                        <div class="current-temp">
                            <span id="current-temp">--</span>
                            <span class="temp-unit">°C</span>
                        </div>
                        <div class="temp-range">
                            <span id="max-temp">--°</span>
                            <span id="min-temp">--°</span>
                        </div>
                        <div class="feels-like">
                            <span>Feels like </span>
                            <span id="feels-like">--°</span>
                        </div>
                    </div>

                    <div class="additional-info">
                        <div class="info-item">
                            <i class="fas fa-tint"></i>
                            <div>
                                <span class="info-label">Humidity</span>
                                <span class="info-value" id="humidity">--%</span>
                            </div>
                        </div>
                        <div class="info-item">
                            <i class="fas fa-wind"></i>
                            <div>
                                <span class="info-label">Wind</span>
                                <span class="info-value" id="wind-speed">-- km/h</span>
                                <span class="wind-direction" id="wind-direction"></span>
                            </div>
                        </div>
                        <div class="info-item">
                            <i class="fas fa-compress-alt"></i>
                            <div>
                                <span class="info-label">Pressure</span>
                                <span class="info-value" id="pressure">-- hPa</span>
                            </div>
                        </div>
                        <div class="info-item">
                            <i class="fas fa-cloud-rain"></i>
                            <div>
                                <span class="info-label">Precipitation</span>
                                <span class="info-value" id="precipitation">-- mm</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="forecast-container">
                <h3>5-Day Forecast</h3>
                <div class="forecast-cards" id="forecast-cards">
                    <div class="loading">Loading forecast...</div>
                </div>
            </div>

            <div class="extra-info">
                <div class="sun-times">
                    <div class="sun-time">
                        <i class="fas fa-sunrise"></i>
                        <span id="sunrise">--:--</span>
                    </div>
                    <div class="sun-time">
                        <i class="fas fa-sunset"></i>
                        <span id="sunset">--:--</span>
                    </div>
                </div>
                <div class="visibility-info">
                    <i class="fas fa-eye"></i>
                    <span id="visibility">-- km</span>
                </div>
                <div class="uv-index">
                    <i class="fas fa-sun"></i>
                    <span id="uv-index">--</span>
                    <span class="uv-label" id="uv-label">Low</span>
                </div>
            </div>

            <div class="hourly-forecast">
                <h3>Hourly Forecast</h3>
                <div class="hourly-scroll" id="hourly-forecast">
                    <div class="loading">Loading hourly data...</div>
                </div>
            </div>
        </main>
    </div>

    <div class="unit-toggle">
        <button class="active" id="celsius-btn">°C</button>
        <button id="fahrenheit-btn">°F</button>
    </div>

    <div class="theme-toggle">
        <button id="theme-btn"><i class="fas fa-moon"></i></button>
    </div>

    <div class="notification" id="notification"></div>

    <script src="script.js"></script>
    <script src="geolocation.js"></script>
</body>
</html>
